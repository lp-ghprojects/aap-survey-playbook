apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: vpn-survey-dynamic
  title: "VPN configuration dynamic form"
  description: >
    Collects VPN parameters. Selecting 'regular' reveals protocol_type;
    selecting 'special' reveals vpn_id.
  tags:
    - ansible
    - vpn
    - self-service

spec:
  owner: platform-team
  type: service

  parameters:
    # Step 1: Authentication token (hidden, auto-injected)
    - title: Authentication
      properties:
        token:
          title: AAP Token
          type: string
          ui:field: AAPTokenField
          ui:widget: hidden
          ui:backstage:
            review:
              show: false

    # Step 2: Base parameters (always shown)
    - title: "Device & action details"
      required:
        - CCSD
        - device_id
        - action_type
        - interface
      properties:
        CCSD:
          title: "CCSD"
          type: string
          description: "Customer circuit service descriptor"

        device_id:
          title: "Device ID"
          type: string
          description: "Target device identifier"

        action_type:
          title: "Action type"
          type: string
          description: "Select the operation to perform"
          enum:
            - start
            - change
            - discontinue
          enumNames:
            - "Start"
            - "Change"
            - "Discontinue"

        interface:
          title: "Interface"
          type: string
          description: "Network interface name (e.g. GigabitEthernet0/1)"

    # Step 3: VPN type + conditional fields
    - title: "VPN configuration"
      required:
        - vpn_type
      properties:
        vpn_type:
          title: "VPN type"
          type: string
          description: "Select VPN type — this controls the next field"
          enum:
            - regular
            - special
          enumNames:
            - "Regular"
            - "Special"

      dependencies:
        vpn_type:
          oneOf:
            - properties:
                vpn_type:
                  enum:
                    - regular
                protocol_type:
                  title: "Protocol type"
                  type: string
                  description: "Select the VPN protocol"
                  enum:
                    - bgp
                    - static
                    - none
                  enumNames:
                    - "BGP"
                    - "Static"
                    - "None"
                  default: bgp
              required:
                - protocol_type

            - properties:
                vpn_type:
                  enum:
                    - special
                vpn_id:
                  title: "VPN ID"
                  type: string
                  description: "Enter the special VPN identifier"
                  minLength: 1
              required:
                - vpn_id

  steps:
    - id: launch-vpn-job
      name: "Launch VPN playbook on localhost"
      action: rhaap:launch-job-template
      input:
        token: ${{ parameters.token }}
        values:
          template: "Survey Demo — Display VPN Input"
          extraVariables:
            CCSD: ${{ parameters.CCSD }}
            device_id: ${{ parameters.device_id }}
            action_type: ${{ parameters.action_type }}
            interface: ${{ parameters.interface }}
            vpn_type: ${{ parameters.vpn_type }}
            protocol_type: ${{ parameters.protocol_type if parameters.vpn_type == 'regular' else '' }}
            vpn_id: ${{ parameters.vpn_id if parameters.vpn_type == 'special' else '' }}
          jobType: run
          verbosity: Normal
          timeout: 300

  output:
    text:
      - title: "Submission summary"
        content: |
          **VPN type:** ${{ parameters.vpn_type }}
          **Device:** ${{ parameters.device_id }}
          **Action:** ${{ parameters.action_type }}
          ${{ '**Protocol:** ' + parameters.protocol_type if parameters.vpn_type == 'regular' else '**VPN ID:** ' + parameters.vpn_id }}
    links:
      - title: "View job in AAP"
        url: ${{ steps['launch-vpn-job'].output.jobUrl }}
