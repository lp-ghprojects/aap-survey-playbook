apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: vpn-survey-dynamic
  title: VPN configuration — dynamic form
  description: Collects VPN parameters and launches an AAP job template.
  tags:
    - ansible
    - vpn
    - self-service

spec:
  owner: platform-team
  type: service

  parameters:
    - title: Authentication
      required:
        - token
      properties:
        token:
          title: AAP Token
          type: string
          description: Paste a valid AAP OAuth2 token for testing

    - title: Device & action details
      required:
        - CCSD
        - device_id
        - action_type
        - interface
      properties:
        CCSD:
          title: CCSD
          type: string

        device_id:
          title: Device ID
          type: string

        action_type:
          title: Action type
          type: string
          enum:
            - start
            - change
            - discontinue
          enumNames:
            - Start
            - Change
            - Discontinue

        interface:
          title: Interface
          type: string

    - title: VPN configuration
      required:
        - vpn_type
      properties:
        vpn_type:
          title: VPN type
          type: string
          enum:
            - regular
            - special
          enumNames:
            - Regular
            - Special

      dependencies:
        vpn_type:
          oneOf:
            - properties:
                vpn_type:
                  enum:
                    - regular
                protocol_type:
                  title: Protocol type
                  type: string
                  enum:
                    - bgp
                    - static
                    - none
                  enumNames:
                    - BGP
                    - Static
                    - None
                  default: none
              required:
                - protocol_type

            - properties:
                vpn_type:
                  enum:
                    - special
                vpn_id:
                  title: VPN ID
                  type: string
                  minLength: 1
              required:
                - vpn_id

  steps:
    - id: launch-vpn-job
      name: Launch VPN playbook in AAP
      action: rhaap:launch-job-template
      input:
        token: ${{ parameters.token }}
        values:
          template: Survey Demo — Display VPN Input
          jobType: run
          extraVariables:
            CCSD: ${{ parameters.CCSD }}
            device_id: ${{ parameters.device_id }}
            action_type: ${{ parameters.action_type }}
            interface: ${{ parameters.interface }}
            vpn_type: ${{ parameters.vpn_type }}
            protocol_type: ${{ parameters.protocol_type if parameters.vpn_type == 'regular' else '' }}
            vpn_id: ${{ parameters.vpn_id if parameters.vpn_type == 'special' else '' }}

  output:
    text:
      - title: Submission summary
        content: |
          **VPN type:** ${{ parameters.vpn_type }}
          **Device:** ${{ parameters.device_id }}
          **Action:** ${{ parameters.action_type }}
          ${{ '**Protocol:** ' + parameters.protocol_type if parameters.vpn_type == 'regular' else '**VPN ID:** ' + parameters.vpn_id }}
