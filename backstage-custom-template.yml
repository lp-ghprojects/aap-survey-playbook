apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: vpn-survey-dynamic
  title: L3VPN provisioning dynamic form
  description: >
    Collects VPN provisioning parameters and dynamically displays
    VPN-specific fields with validation.
  tags:
    - ansible
    - vpn
    - self-service

spec:
  owner: platform-team
  type: service

  parameters:

    # ========================================================================
    # Base Parameters
    # ========================================================================
    - title: Device and Request Details

      required:
        - ccsd
        - pe_device_id
        - action_type
        - enable_as_override
        - vpn_type
        - pe_ip_address
        - pe_interface
        - cisco_interface_type
        - interface

      properties:

        ccsd:
          title: CCSD
          type: string
          description: Customer circuit service descriptor
          minLength: 4
          pattern: '^([a-np-zA-NP-Z]{1}[a-hj-np-zA-HJ-NP-Z0-9]{3})|([a-np-zA-NP-Z0-9]{1}[a-hj-np-zA-HJ-NP-Z]{1}[a-hj-np-zA-HJ-NP-Z0-9]{2})|([a-np-zA-NP-Z0-9]{1}[a-hj-np-zA-HJ-NP-Z0-9]{1}[a-hj-np-zA-HJ-NP-Z]{1}[a-hj-np-zA-HJ-NP-Z0-9]{1})|([a-np-zA-NP-Z0-9]{1}[a-hj-np-zA-HJ-NP-Z0-9]{2}[a-hj-np-zA-HJ-NP-Z]{1})$'

        pe_device_id:
          title: PE Device ID
          type: string
          description: Provider edge device identifier
          pattern: '^[uU][jJ][eE][acepwACEPW][a-zA-Z]{3}(?:030|040|050|060|130|140|250|260?)$'

        action_type:
          title: Action Type
          type: string
          description: Select the requested operation
          enum:
            - start
            - change
            - discontinue
          enumNames:
            - Start
            - Change
            - Discontinue
          default: start

        enable_as_override:
          title: Enable as-override
          type: boolean
          description: Enable AS override
          default: false

        vpn_type:
          title: VPN Type
          type: string
          description: Select VPN type
          enum:
            - niprvrf
            - pisp
            - coi
            - regular
          enumNames:
            - NIPRVRF
            - PISP
            - COI
            - Regular

        pe_ip_address:
          title: PE IP Address
          type: string
          description: Provider edge IPv4 address
          pattern: '^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$'

        pe_interface:
          title: PE Interface
          type: string
          description: Provider edge interface name

        cisco_interface_type:
          title: Cisco Interface Type
          type: string
          description: Cisco interface family
          enum:
            - GigabitEthernet
            - TenGigE
            - HundredGigE

        interface:
          title: Interface
          type: string
          description: Interface format example 0/0/0 or 0/0/0.100
          pattern: '^([0-9]+(/[0-9]+){2,4})(\.([1-9]|[1-9][0-9]|[1-9][0-9]{2}|[1-3][0-9]{3}|40[0-8][0-9]|409[0-3]))?$'

    # ========================================================================
    # VPN Specific Configuration
    # ========================================================================
    - title: VPN Configuration

      required:
        - vpn_type

      properties:

        vpn_type:
          title: VPN Type
          type: string
          enum:
            - niprvrf
            - pisp
            - coi
            - regular

      dependencies:

        vpn_type:
          oneOf:

            # ==================================================================
            # NIPRVRF
            # ==================================================================
            - properties:

                vpn_type:
                  enum:
                    - niprvrf

                service_protocol:
                  title: Service Protocol
                  type: string
                  enum:
                    - bgp
                    - static
                    - none
                  enumNames:
                    - BGP
                    - Static
                    - None
                  default: none

              required:
                - service_protocol

            # ==================================================================
            # PISP
            # ==================================================================
            - properties:

                vpn_type:
                  enum:
                    - pisp

                service_protocol:
                  title: Service Protocol
                  type: string
                  enum:
                    - bgp
                    - static
                    - none
                  enumNames:
                    - BGP
                    - Static
                    - None
                  default: none

                mtu_type:
                  title: MTU Type
                  type: string
                  enum:
                    - default
                    - jumbo
                    - other
                  enumNames:
                    - Default
                    - Jumbo
                    - Other
                  default: default

              required:
                - service_protocol
                - mtu_type

              dependencies:
                mtu_type:
                  oneOf:

                    # default => 1000
                    - properties:
                        mtu_type:
                          enum:
                            - default

                        mtu_value:
                          title: MTU Value
                          type: integer
                          default: 1000
                          readOnly: true

                    # jumbo => 2000
                    - properties:
                        mtu_type:
                          enum:
                            - jumbo

                        mtu_value:
                          title: MTU Value
                          type: integer
                          default: 2000
                          readOnly: true

                    # other => user input
                    - properties:
                        mtu_type:
                          enum:
                            - other

                        mtu_value:
                          title: MTU Value
                          type: integer
                          description: Enter custom MTU value
                          minimum: 64
                          maximum: 9000

                      required:
                        - mtu_value

            # ==================================================================
            # COI
            # ==================================================================
            - properties:

                vpn_type:
                  enum:
                    - coi

                service_protocol:
                  title: Service Protocol
                  type: string
                  enum:
                    - bgp
                    - static
                    - none
                  enumNames:
                    - BGP
                    - Static
                    - None
                  default: none

                mtu_type:
                  title: MTU Type
                  type: string
                  enum:
                    - default
                    - jumbo
                    - other
                  enumNames:
                    - Default
                    - Jumbo
                    - Other
                  default: default

              required:
                - service_protocol
                - mtu_type

              dependencies:
                mtu_type:
                  oneOf:

                    # default => 1000
                    - properties:
                        mtu_type:
                          enum:
                            - default

                        mtu_value:
                          title: MTU Value
                          type: integer
                          default: 1000
                          readOnly: true

                    # jumbo => 2000
                    - properties:
                        mtu_type:
                          enum:
                            - jumbo

                        mtu_value:
                          title: MTU Value
                          type: integer
                          default: 2000
                          readOnly: true

                    # other => user input
                    - properties:
                        mtu_type:
                          enum:
                            - other

                        mtu_value:
                          title: MTU Value
                          type: integer
                          description: Enter custom MTU value
                          minimum: 64
                          maximum: 9000

                      required:
                        - mtu_value

            # ==================================================================
            # REGULAR
            # ==================================================================
            - properties:

                vpn_type:
                  enum:
                    - regular

                vpn_id:
                  title: VPN ID
                  type: string
                  description: Enter VPN identifier
                  minLength: 1

                service_protocol:
                  title: Service Protocol
                  type: string
                  enum:
                    - bgp
                    - static
                    - none
                  enumNames:
                    - BGP
                    - Static
                    - None
                  default: none

                mtu_type:
                  title: MTU Type
                  type: string
                  enum:
                    - default
                    - jumbo
                    - other
                  enumNames:
                    - Default
                    - Jumbo
                    - Other
                  default: default

              required:
                - vpn_id
                - service_protocol
                - mtu_type

              dependencies:
                mtu_type:
                  oneOf:

                    # default => 1000
                    - properties:
                        mtu_type:
                          enum:
                            - default

                        mtu_value:
                          title: MTU Value
                          type: integer
                          default: 1000
                          readOnly: true

                    # jumbo => 2000
                    - properties:
                        mtu_type:
                          enum:
                            - jumbo

                        mtu_value:
                          title: MTU Value
                          type: integer
                          default: 2000
                          readOnly: true

                    # other => user input
                    - properties:
                        mtu_type:
                          enum:
                            - other

                        mtu_value:
                          title: MTU Value
                          type: integer
                          description: Enter custom MTU value
                          minimum: 64
                          maximum: 9000

                      required:
                        - mtu_value

  # ==========================================================================
  # AAP Launch Step
  # ==========================================================================
  steps:
    - id: launch-vpn-job
      name: Launch VPN playbook in AAP
      action: rhaap:launch-job-template

      input:
        token: ${{ secrets.aapToken }}

        values:
          template: AAP-SSP Demo Template
          jobType: run
          timeout: 300

          extraVariables:
            ccsd: ${{ parameters.ccsd }}
            pe_device_id: ${{ parameters.pe_device_id }}
            action_type: ${{ parameters.action_type }}
            enable_as_override: ${{ parameters.enable_as_override }}
            vpn_type: ${{ parameters.vpn_type }}
            service_protocol: ${{ [parameters.protocol_type] if parameters.vpn_type == 'regular' else [] }}
            mtu_type: ${{ parameters.mtu_type }}
            mtu_value: ${{ parameters.mtu_value }}
            vpn_id: ${{ parameters.vpn_id }}
            pe_ip_address: ${{ parameters.pe_ip_address }}
            pe_interface: ${{ parameters.pe_interface }}
            cisco_interface_type: ${{ parameters.cisco_interface_type }}
            interface: ${{ parameters.interface }}

  # ==========================================================================
  # Output Summary
  # ==========================================================================
  output:
    text:
      - title: VPN Request Summary
        content: |
          **CCSD:** ${{ parameters.ccsd }}

          **PE Device ID:** ${{ parameters.pe_device_id }}

          **Action Type:** ${{ parameters.action_type }}

          **Enable AS Override:** ${{ parameters.enable_as_override }}

          **VPN Type:** ${{ parameters.vpn_type }}

          **Service Protocol:** ${{ parameters.service_protocol }}

          **MTU Type:** ${{ parameters.mtu_type }}

          **MTU Value:** ${{ parameters.mtu_value }}

          **VPN ID:** ${{ parameters.vpn_id }}

          **PE IP Address:** ${{ parameters.pe_ip_address }}

          **PE Interface:** ${{ parameters.pe_interface }}

          **Cisco Interface Type:** ${{ parameters.cisco_interface_type }}

          **Interface:** ${{ parameters.interface }}
